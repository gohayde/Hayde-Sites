<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#13212E',
                            darker: '#040D0E',
                            accent: '#7FF7E2',
                            accent_hover: '#37C8AF',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased bg-white">

    <section class="relative w-full min-h-[90vh] flex items-center pt-32 pb-24 lg:pt-48 lg:pb-32 overflow-hidden">
        
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="House Exterior" class="w-full h-full object-cover object-center" />
            <div class="absolute inset-0 bg-gradient-to-r from-brand-dark/95 via-brand-dark/80 to-brand-dark/40"></div>
        </div>

        <div class="absolute bottom-0 right-0 w-32 md:w-48 h-auto opacity-30 pointer-events-none z-0">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="50" y="0" width="50" height="100" fill="#7FF7E2"/>
            </svg>
        </div>

        <div class="relative z-10 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="max-w-2xl xl:max-w-3xl flex flex-col items-start text-left">
                
                <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-extrabold text-white leading-[1.1] uppercase tracking-tight mb-4">
                    Trusted Exterior Cleaning Company in Durham, NC
                </h1>

                <p class="text-lg md:text-2xl font-semibold text-white tracking-wide mb-8">
                    We’ll INSTANTLY Boost Your Home’s Curb Appeal
                </p>

                <ul class="space-y-4 mb-10 text-base md:text-lg text-white font-light">
                    <li class="flex items-center gap-3">
                        <svg class="w-3 h-3 text-brand-accent fill-current flex-shrink-0" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="8"/></svg>
                        <span>Fully Licensed & Insured</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <svg class="w-3 h-3 text-brand-accent fill-current flex-shrink-0" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="8"/></svg>
                        <span>100% Satisfaction Guarantee</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <svg class="w-3 h-3 text-brand-accent fill-current flex-shrink-0" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="8"/></svg>
                        <span>25 Year Gutter Guard Warranty</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <svg class="w-3 h-3 text-brand-accent fill-current flex-shrink-0" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="8"/></svg>
                        <span>Annual Care Plan Memberships</span>
                    </li>
                </ul>

                <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-4">
                    <a href="#" class="inline-flex justify-center items-center px-8 py-4 bg-brand-accent border border-brand-accent text-brand-darker text-base md:text-lg font-bold uppercase tracking-wider transition-colors duration-300 hover:bg-brand-dark hover:text-white hover:border-brand-dark">
                        Get A Fast Quote
                    </a>
                    <a href="tel:19192807240" class="inline-flex justify-center items-center px-8 py-4 bg-transparent border border-white text-white text-base md:text-lg font-bold uppercase tracking-wider transition-colors duration-300 hover:bg-white hover:text-brand-darker">
                        (919) 280-7240
                    </a>
                </div>

            </div>
        </div>
    </section>

</body>
</html>
